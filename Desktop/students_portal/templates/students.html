<h1>Students</h1>

<a href="/students/add">Add Student</a>

<table>
        {% for student in students %}
    <tr>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>

    <td>
        <a href="/students/{{ student[0] }}/edit">Edit</a>
        <form action="/students/{{ student[0] }}/delete" method="post">
            <button type="submit">Delete</button>
        </form>
    </td>
    </tr>
    {% endfor %}
</table>
